name: reproduce-pipeline

# Reproduce the floral-trait results from the committed inputs, with no local
# dependency. Runs on demand and on pushes that touch the pipeline or its inputs,
# and uploads the measured CSVs and figures as build artifacts.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.py"
      - "run_pipeline.sh"
      - "withlocation.csv"
      - "mask.zip"
      - "shimask/**"
      - "shimahotarubukuro/**"
      - "requirements.txt"
      - ".github/workflows/pipeline.yml"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pipeline
        run: bash run_pipeline.sh
      - name: Upload measured tables
        uses: actions/upload-artifact@v4
        with:
          name: trait-tables
          path: results_shimask_all/*.csv
      - name: Upload figures and cards
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: |
            results_shimask_all/*.png
            results_shimask_all/measure_cards/*.png
            results_shimask_all/numbered_index/*.png
          if-no-files-found: warn
