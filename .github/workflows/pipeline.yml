name: reproduce-pipeline

# Reproduce the publication measurements, global Pst and pairwise Pst from the
# committed reviewed inputs. The workflow is read-only: generated tables and figures
# are uploaded as artifacts and must match the tracked publication snapshots.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.py"
      - "run_pipeline.sh"
      - "withlocation.csv"
      - "mask.zip"
      - "shimask/**"
      - "shimahotarubukuro/**"
      - "requirements.txt"
      - ".github/workflows/pipeline.yml"
  pull_request:
    branches: [main]
    paths:
      - "*.py"
      - "run_pipeline.sh"
      - "withlocation.csv"
      - "mask.zip"
      - "shimask/**"
      - "shimahotarubukuro/**"
      - "requirements.txt"
      - ".github/workflows/pipeline.yml"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run publication pipeline
        run: bash run_pipeline.sh
      - name: Verify tracked publication tables
        run: |
          git diff --exit-code -- results_shimask_all/*.csv
          test ! -e results_shimask_all/guide_divergence_stats.csv
      - name: Upload measured tables
        uses: actions/upload-artifact@v4
        with:
          name: trait-tables
          path: results_shimask_all/*.csv
      - name: Upload figures and cards
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: |
            results_shimask_all/*.png
            results_shimask_all/measure_cards/*.png
            results_shimask_all/numbered_index/*.png
          if-no-files-found: warn
