name: reproduce-pipeline

# Temporarily manual-only on the publication-cleanup branch while the pipeline is
# changed as one coherent unit. Push validation is restored before the PR is opened.
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pipeline
        run: bash run_pipeline.sh
      - name: Upload measured tables
        uses: actions/upload-artifact@v4
        with:
          name: trait-tables
          path: results_shimask_all/*.csv
      - name: Upload figures and cards
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: |
            results_shimask_all/*.png
            results_shimask_all/measure_cards/*.png
            results_shimask_all/numbered_index/*.png
          if-no-files-found: warn
