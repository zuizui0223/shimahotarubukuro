name: QC v2 all-sheet pre-review

on:
  push:
    branches:
      - main
    paths:
      - "shimahotarubukuro/**/*.jpg"
      - "shimahotarubukuro/**/*.jpeg"
      - "measure_guides*.py"
      - "qc_single_sheet.py"
      - "run_all_sheets_review_qc.py"
      - "requirements*.txt"
      - ".github/workflows/qc-v2.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Verify raw scan inventory
        id: inventory
        shell: bash
        run: |
          set -o pipefail
          mkdir -p results_all_review
          find shimahotarubukuro -type f \( -iname '*.jpg' -o -iname '*.jpeg' \) | sort | tee results_all_review/raw_inventory.txt
          test -s results_all_review/raw_inventory.txt
          printf 'raw_sheet_count=%s\n' "$(wc -l < results_all_review/raw_inventory.txt)" | tee results_all_review/raw_inventory_count.txt

      - name: Run regression tests
        id: regression
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee results_all_review/regression-tests.txt

      - name: Run every raw sheet through pre-QC
        id: detection
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python run_all_sheets_review_qc.py \
            --data-root shimahotarubukuro \
            --out-dir results_all_review \
            2>&1 | tee results_all_review/all-sheet-run.txt

      - name: Prepare current review inputs for Streamlit
        id: review_inputs
        if: steps.detection.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          rm -rf results/review_overlays
          mkdir -p results/review_overlays
          while IFS= read -r sheet_dir; do
            stem="$(basename "$sheet_dir")"
            destination="results/review_overlays/${stem//~/-}"
            mkdir -p "$destination"
            cp "$sheet_dir"/overlays/*.png "$destination/"
            cp "$sheet_dir"/traits.csv "$destination/traits.csv"
          done < <(find results_all_review/sheets -mindepth 2 -maxdepth 2 -type d | sort)
          expected="$(wc -l < results_all_review/raw_inventory.txt)"
          overlays="$(find results/review_overlays -type f -name '*.png' | wc -l)"
          traits="$(find results/review_overlays -type f -name 'traits.csv' | wc -l)"
          printf 'review_overlays=%s review_traits=%s expected=%s\n' \
            "$overlays" "$traits" "$expected" | tee results_all_review/review_input_count.txt
          test "$overlays" -eq "$expected"
          test "$traits" -eq "$expected"

      - name: Commit current review inputs for Streamlit
        if: steps.review_inputs.outcome == 'success' && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/review_overlays
          if git diff --cached --quiet; then
            echo "Review inputs are already current."
          else
            git commit -m "Update all-sheet review inputs"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Record source commit and review status
        if: always()
        run: |
          printf '%s\n' "$GITHUB_SHA" > results_all_review/SOURCE_COMMIT.txt
          printf '%s\n' "AUTO PRE-QC ONLY. Human sheet-by-sheet review is required before acceptance." > results_all_review/REVIEW_STATUS.txt

      - name: Upload private all-sheet QC artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shimahotarubukuro-all-sheets-pre-qc
          path: results_all_review/
          retention-days: 7
          if-no-files-found: error

      - name: Enforce quality gate
        if: always()
        env:
          REGRESSION_OUTCOME: ${{ steps.regression.outcome }}
          DETECTION_OUTCOME: ${{ steps.detection.outcome }}
          REVIEW_INPUT_OUTCOME: ${{ steps.review_inputs.outcome }}
        run: |
          test "$REGRESSION_OUTCOME" = success
          test "$DETECTION_OUTCOME" = success
          test "$REVIEW_INPUT_OUTCOME" = success
