name: QC v2 all-sheet pre-review

on:
  push:
    branches:
      - feat/all-sheets-auto-qc-review
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Verify raw scan inventory
        id: inventory
        shell: bash
        run: |
          set -o pipefail
          mkdir -p results_all_review
          find shimahotarubukuro -type f \( -iname '*.jpg' -o -iname '*.jpeg' \) | sort | tee results_all_review/raw_inventory.txt
          test -s results_all_review/raw_inventory.txt
          printf 'raw_sheet_count=%s\n' "$(wc -l < results_all_review/raw_inventory.txt)" | tee results_all_review/raw_inventory_count.txt

      - name: Run regression tests
        id: regression
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee results_all_review/regression-tests.txt

      - name: Run every raw sheet through pre-QC
        id: detection
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python run_all_sheets_review_qc.py \
            --data-root shimahotarubukuro \
            --out-dir results_all_review \
            2>&1 | tee results_all_review/all-sheet-run.txt

      - name: Record source commit and review status
        if: always()
        run: |
          printf '%s\n' "$GITHUB_SHA" > results_all_review/SOURCE_COMMIT.txt
          printf '%s\n' "AUTO PRE-QC ONLY. Human sheet-by-sheet review is required before acceptance." > results_all_review/REVIEW_STATUS.txt

      - name: Upload private all-sheet QC artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shimahotarubukuro-all-sheets-pre-qc
          path: results_all_review/
          retention-days: 7
          if-no-files-found: error

      - name: Enforce quality gate
        if: always()
        env:
          REGRESSION_OUTCOME: ${{ steps.regression.outcome }}
          DETECTION_OUTCOME: ${{ steps.detection.outcome }}
        run: |
          test "$REGRESSION_OUTCOME" = success
          test "$DETECTION_OUTCOME" = success
