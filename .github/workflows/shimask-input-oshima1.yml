name: Shimask input all-sheet validation

on:
  pull_request:
    branches: [main]
    paths:
      - "shimask_input.py"
      - "qc_single_sheet_shimask.py"
      - "run_all_shimask_confirmed.py"
      - "measure_shimask_red_rgb.py"
      - "tests/test_shimask_input.py"
      - "qc_single_sheet.py"
      - "measure_guides_review_spots.py"
      - "measure_guides_review_traits.py"
      - "measure_guides_review_organs.py"
      - "shimask/**"
      - "shimahotarubukuro/**/*.jpg"
      - "shimahotarubukuro/**/*.jpeg"
      - "requirements.txt"
      - ".github/workflows/shimask-input-oshima1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-all-sheets:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Measure actual red annotation RGB
        run: |
          python measure_shimask_red_rgb.py \
            --labels shimask \
            --out-dir results_shimask_red_rgb
          cat results_shimask_red_rgb/RED_RGB_REPORT.txt
      - name: Run shimask input tests
        run: python -m unittest -v tests/test_shimask_input.py
      - name: Validate reviewed input inventory
        shell: bash
        run: |
          set -euo pipefail
          count=$(find shimask -maxdepth 1 -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.tif' -o -iname '*.tiff' \) | wc -l)
          echo "shimask sheets=${count}"
          test "$count" -eq 20
      - name: Run established reviewed pipeline on all 20 confirmed sheets
        id: analysis
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p results_shimask_all
          python run_all_shimask_confirmed.py \
            --labels shimask \
            --raw-root shimahotarubukuro \
            --out-dir results_shimask_all \
            2>&1 | tee results_shimask_all/all-sheet-run.txt
      - name: Validate manifest and completed outputs
        id: validation
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          test -s results_shimask_all/manifest.csv
          test -s results_shimask_all/SUMMARY.txt
          cat results_shimask_all/SUMMARY.txt
          python - <<'PY'
          import csv
          from pathlib import Path

          root = Path('results_shimask_all')
          with (root / 'manifest.csv').open(encoding='utf-8-sig') as handle:
              rows = list(csv.DictReader(handle))
          assert len(rows) == 20, f'expected 20 manifest rows, found {len(rows)}'
          failed = [row for row in rows if row['status'] != 'success']
          for row in rows:
              print(row['sheet'], row['status'], 'traits=' + row['n_traits'], 'organs=' + row['n_organs'], row['error'])
          assert not failed, f"{len(failed)} sheet(s) failed: {[row['sheet'] for row in failed]}"
          assert all(int(row['n_traits']) > 0 for row in rows)
          assert all(int(row['n_spot_summaries']) > 0 for row in rows)
          PY
      - name: Upload all-sheet reviewed artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shimask-input-all-20-sheets-review
          path: |
            results_shimask_all/
            results_shimask_red_rgb/
          retention-days: 14
          if-no-files-found: error
      - name: Enforce all-sheet quality gate
        if: always()
        env:
          ANALYSIS_OUTCOME: ${{ steps.analysis.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          test "$ANALYSIS_OUTCOME" = success
          test "$VALIDATION_OUTCOME" = success
