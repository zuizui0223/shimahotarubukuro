name: Automatic extraction v3 prototype

on:
  pull_request:
    branches:
      - main
    paths:
      - "measure_guides_v3*.py"
      - "measure_guides_v2.py"
      - "measure_guides.py"
      - "evaluate_*shimask*.py"
      - "tests/test_measure_guides_v3*.py"
      - "shimahotarubukuro/**/*.jpg"
      - "shimahotarubukuro/**/*.jpeg"
      - "shimask/**"
      - "requirements.txt"
      - ".github/workflows/qc-v3-prototype.yml"
  workflow_dispatch:

concurrency:
  group: v3-prototype-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prototype:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run v3 synthetic tests
        run: |
          python -m unittest -v \
            tests/test_measure_guides_v3.py \
            tests/test_measure_guides_v3_refine.py \
            tests/test_measure_guides_v3_refine2.py \
            tests/test_measure_guides_v3_refine4.py \
            tests/test_measure_guides_v3_refine5.py \
            tests/test_measure_guides_v3_refine6.py \
            tests/test_measure_guides_v3_refine7.py \
            tests/test_measure_guides_v3_refine8.py \
            tests/test_measure_guides_v3_refine9.py

      - name: Inspect shimask reviewed labels
        shell: bash
        run: |
          set -euo pipefail
          python evaluate_shimask_labels.py \
            --labels shimask \
            --out-dir results_v3/shimask_ground_truth
          cat results_v3/shimask_ground_truth/FILES.txt

      - name: Prepare all shimask-matched raw scans
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import shutil
          from pathlib import Path
          from evaluate_v3_against_shimask import find_raw
          from evaluate_shimask_labels import IMAGE_SUFFIXES

          label_root = Path('shimask')
          raw_root = Path('shimahotarubukuro')
          trial = Path('_shimask_trial')
          mappings = []
          for label in sorted(p for p in label_root.rglob('*') if p.is_file() and p.suffix.lower() in IMAGE_SUFFIXES):
              raw = find_raw(label, raw_root)
              destination = trial / raw.parent.name / raw.name
              destination.parent.mkdir(parents=True, exist_ok=True)
              if not destination.exists():
                  shutil.copy2(raw, destination)
              mappings.append((label.as_posix(), raw.as_posix()))
          Path('shimask_mapping.txt').write_text(
              '\n'.join(f'{label}\t{raw}' for label, raw in mappings) + '\n',
              encoding='utf-8',
          )
          print('\n'.join(f'{label} -> {raw}' for label, raw in mappings))
          PY

      - name: Run v3 on all reviewed sheets
        shell: bash
        run: |
          set -euo pipefail
          python measure_guides_v3_refine9.py \
            --data-root _shimask_trial \
            --out-dir results_shimask \
            2>&1 | tee results_shimask-run.txt

      - name: Score v3 against shimask
        shell: bash
        run: |
          set -euo pipefail
          python evaluate_v3_against_shimask.py \
            --labels shimask \
            --raw-root shimahotarubukuro \
            --predictions results_shimask \
            --out-dir results_v3/shimask_evaluation
          cat results_v3/shimask_evaluation/SUMMARY.txt
          cat results_v3/shimask_evaluation/metrics.csv

      - name: Upload v3 prototype results
        uses: actions/upload-artifact@v4
        with:
          name: shimahotarubukuro-v3-shimask-evaluation
          path: |
            results_v3/
            results_shimask/
            results_shimask-run.txt
            shimask_mapping.txt
          retention-days: 7
          if-no-files-found: error
