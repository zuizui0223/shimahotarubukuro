name: Automatic extraction v3 prototype

on:
  pull_request:
    branches:
      - main
    paths:
      - "measure_guides_v3*.py"
      - "generate_v3_rescue.py"
      - "apply_v3_rescue.py"
      - "export_shimask_ground_truth.py"
      - "evaluate_*shimask*.py"
      - "shimask_annotation_diff.py"
      - "tests/test_evaluate_v3_against_shimask_v2.py"
      - "tests/test_shimask_annotation_diff.py"
      - "measure_guides_v2.py"
      - "measure_guides.py"
      - "shimahotarubukuro/**/*.jpg"
      - "shimahotarubukuro/**/*.jpeg"
      - "shimask/**"
      - "requirements.txt"
      - ".github/workflows/qc-v3-prototype.yml"
  workflow_dispatch:

concurrency:
  group: v3-prototype-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prototype:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run synthetic tests
        run: |
          python -m unittest -v \
            tests/test_measure_guides_v3.py \
            tests/test_measure_guides_v3_refine.py \
            tests/test_measure_guides_v3_refine2.py \
            tests/test_measure_guides_v3_refine4.py \
            tests/test_measure_guides_v3_refine5.py \
            tests/test_measure_guides_v3_refine6.py \
            tests/test_measure_guides_v3_refine7.py \
            tests/test_measure_guides_v3_refine8.py \
            tests/test_measure_guides_v3_refine9.py \
            tests/test_measure_guides_v3_refine10.py \
            tests/test_measure_guides_v3_refine13.py \
            tests/test_measure_guides_v3_refine18.py \
            tests/test_measure_guides_v3_refine19.py \
            tests/test_evaluate_v3_against_shimask_v2.py \
            tests/test_shimask_annotation_diff.py

      - name: Export canonical shimask measurements
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p results_v3
          python export_shimask_ground_truth.py \
            --labels shimask \
            --raw-root shimahotarubukuro \
            --out-dir results_v3/shimask_ground_truth_measurements \
            2>&1 | tee results_v3/shimask-ground-truth-summary.txt
          test -f results_v3/shimask_ground_truth_measurements/ground_truth_corollas.csv
          test -f results_v3/shimask_ground_truth_measurements/ground_truth_organs.csv

      - name: Run accepted v3 extraction
        shell: bash
        run: |
          set -euo pipefail
          python measure_guides_v3_refine19.py \
            --data-root shimahotarubukuro \
            --out-dir results_shimask \
            2>&1 | tee results_shimask-run.txt

      - name: Validate reproductive trait columns
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          from pathlib import Path
          trait_required = {
              'auto_max_width_mm', 'basal_width_mm', 'tube_width_mid_mm',
              'throat_width_mm', 'opening_width_mm', 'tube_length_mm',
              'lobe_length_mm', 'lobe_count_auto', 'width_length_ratio',
              'lobe_area_mm2', 'tube_area_mm2', 'corolla_perimeter_mm',
          }
          organ_required = {
              'organ_instance_id', 'organ_sample_index', 'organ_sample_count',
              'organ_len_mm', 'organ_width_mm', 'organ_type_auto',
              'organ_identity_status',
          }
          with Path('results_shimask/traits_v3.csv').open(encoding='utf-8-sig') as handle:
              fields = set(csv.DictReader(handle).fieldnames or [])
          missing = trait_required - fields
          if missing:
              raise SystemExit(f'missing trait columns: {sorted(missing)}')
          with Path('results_shimask/organs_v3.csv').open(encoding='utf-8-sig') as handle:
              fields = set(csv.DictReader(handle).fieldnames or [])
          missing = organ_required - fields
          if missing:
              raise SystemExit(f'missing organ columns: {sorted(missing)}')
          print('reproductive trait columns validated')
          PY

      - name: Generate fallback rescue package
        shell: bash
        run: |
          set -euo pipefail
          python generate_v3_rescue.py \
            --data-root shimahotarubukuro \
            --results results_shimask \
            --out-dir results_v3/rescue \
            2>&1 | tee results_v3/rescue-summary.txt
          test -f results_v3/rescue/manual_rescue_template.csv
          test -f results_v3/rescue/mask_rescue_template.csv
          cat results_v3/rescue-summary.txt

      - name: Score against annotation-only shimask ground truth
        shell: bash
        run: |
          set -euo pipefail
          python evaluate_v3_against_shimask_v2.py \
            --labels shimask \
            --raw-root shimahotarubukuro \
            --predictions results_shimask \
            --out-dir results_v3/shimask_evaluation
          cat results_v3/shimask_evaluation/SUMMARY.txt
          cat results_v3/shimask_evaluation/metrics.csv

      - name: Upload v3 results
        uses: actions/upload-artifact@v4
        with:
          name: shimahotarubukuro-v3-shimask-evaluation
          path: |
            results_v3/
            results_shimask/
            results_shimask-run.txt
          retention-days: 7
          if-no-files-found: error
