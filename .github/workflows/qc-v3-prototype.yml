name: Automatic extraction v3 prototype

on:
  pull_request:
    branches:
      - main
    paths:
      - "measure_guides_v3*.py"
      - "run_refine14_with_erosion.py"
      - "measure_guides_v2.py"
      - "measure_guides.py"
      - "evaluate_*shimask*.py"
      - "tests/test_measure_guides_v3*.py"
      - "shimahotarubukuro/**/*.jpg"
      - "shimahotarubukuro/**/*.jpeg"
      - "shimask/**"
      - "requirements.txt"
      - ".github/workflows/qc-v3-prototype.yml"
  workflow_dispatch:

concurrency:
  group: v3-prototype-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prototype:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run v3 synthetic tests
        run: |
          python -m unittest -v \
            tests/test_measure_guides_v3.py \
            tests/test_measure_guides_v3_refine.py \
            tests/test_measure_guides_v3_refine2.py \
            tests/test_measure_guides_v3_refine4.py \
            tests/test_measure_guides_v3_refine5.py \
            tests/test_measure_guides_v3_refine6.py \
            tests/test_measure_guides_v3_refine7.py \
            tests/test_measure_guides_v3_refine8.py \
            tests/test_measure_guides_v3_refine9.py \
            tests/test_measure_guides_v3_refine10.py \
            tests/test_measure_guides_v3_refine13.py

      - name: Benchmark stronger edge erosion distances
        shell: bash
        run: |
          set -euo pipefail
          for spec in "06 0.6" "07 0.7" "08 0.8" "09 0.9" "10 1.0"; do
            set -- $spec
            tag=$1
            erosion=$2
            python run_refine14_with_erosion.py \
              --erosion-mm "$erosion" \
              --data-root shimahotarubukuro \
              --out-dir "results_${tag}" \
              2>&1 | tee "results_${tag}-run.txt"
            python evaluate_v3_against_shimask.py \
              --labels shimask \
              --raw-root shimahotarubukuro \
              --predictions "results_${tag}" \
              --out-dir "results_v3/eval_${tag}"
            echo "===== erosion ${erosion} mm ====="
            cat "results_v3/eval_${tag}/SUMMARY.txt"
          done

      - name: Compare erosion benchmarks with area guard
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import csv

          specs = [('06', 0.6), ('07', 0.7), ('08', 0.8), ('09', 0.9), ('10', 1.0)]
          rows = []
          areas = {}
          for tag, erosion in specs:
              summary = {}
              for line in Path(f'results_v3/eval_{tag}/SUMMARY.txt').read_text().splitlines():
                  if '=' in line:
                      key, value = line.split('=', 1)
                      try:
                          summary[key] = float(value)
                      except ValueError:
                          pass
              with Path(f'results_{tag}/traits_v3.csv').open(encoding='utf-8-sig') as handle:
                  vals = [float(r['corolla_area_mm2']) for r in csv.DictReader(handle) if r.get('corolla_area_mm2')]
              areas[tag] = sum(vals) / len(vals)
              recall = summary['mean_red_boundary_recall']
              precision = summary['mean_pred_boundary_precision']
              f1 = 2 * recall * precision / max(recall + precision, 1e-12)
              rows.append({
                  'erosion_mm': erosion,
                  'boundary_recall': recall,
                  'boundary_precision': precision,
                  'boundary_f1': f1,
                  'organ_recall': summary['mean_organ_recall_10mm'],
                  'organ_precision': summary['mean_organ_precision_10mm'],
                  'mean_corolla_area_mm2': areas[tag],
              })
          baseline = areas['06']
          for row in rows:
              row['area_change_pct_vs_06'] = 100.0 * (row['mean_corolla_area_mm2'] - baseline) / baseline
              row['passes_area_guard'] = abs(row['area_change_pct_vs_06']) <= 8.0
          eligible = [r for r in rows if r['passes_area_guard']]
          eligible.sort(key=lambda r: r['boundary_f1'], reverse=True)
          rows.sort(key=lambda r: r['erosion_mm'])
          with Path('results_v3/erosion_benchmark.csv').open('w', newline='', encoding='utf-8') as handle:
              writer = csv.DictWriter(handle, fieldnames=rows[0].keys())
              writer.writeheader(); writer.writerows(rows)
          print(*rows, sep='\n')
          print('BEST_ELIGIBLE', eligible[0])
          PY

      - name: Upload v3 prototype results
        uses: actions/upload-artifact@v4
        with:
          name: shimahotarubukuro-v3-erosion-benchmark
          path: |
            results_v3/
            results_06/
            results_07/
            results_08/
            results_09/
            results_10/
            results_06-run.txt
            results_07-run.txt
            results_08-run.txt
            results_09-run.txt
            results_10-run.txt
          retention-days: 7
          if-no-files-found: error
