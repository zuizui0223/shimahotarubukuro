name: Confirmed shimask trait measurements

on:
  pull_request:
    branches:
      - agent/automatic-extraction-v3
      - main
    paths:
      - "measure_confirmed_shimask_traits.py"
      - "measure_guides_review_traits.py"
      - "measure_guides_review_spots.py"
      - "export_shimask_ground_truth.py"
      - "shimask/**"
      - "shimahotarubukuro/**/*.jpg"
      - "shimahotarubukuro/**/*.jpeg"
      - "tests/test_measure_confirmed_shimask_traits.py"
      - "requirements.txt"
      - ".github/workflows/confirmed-shimask-traits.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  confirmed-traits:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest -v tests/test_measure_confirmed_shimask_traits.py
      - name: Validate confirmed annotation input
        shell: bash
        run: |
          set -euo pipefail
          test -d shimask || {
            echo "::error::Required human-reviewed annotation directory 'shimask/' is not present in this branch."
            exit 1
          }
          count=$(find shimask -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.tif' -o -iname '*.tiff' \) | wc -l)
          echo "confirmed annotation images: ${count}"
          test "${count}" -gt 0 || {
            echo "::error::No human-reviewed shimask annotation images were found."
            exit 1
          }
      - name: Measure confirmed traits
        shell: bash
        run: |
          set -euo pipefail
          python measure_confirmed_shimask_traits.py \
            --labels shimask \
            --raw-root shimahotarubukuro \
            --out-dir results_confirmed_traits
          test -f results_confirmed_traits/confirmed_corolla_traits.csv
          test -f results_confirmed_traits/confirmed_reproductive_organs.csv
          test -f results_confirmed_traits/PROVENANCE.txt
          corolla_rows=$(($(wc -l < results_confirmed_traits/confirmed_corolla_traits.csv) - 1))
          organ_rows=$(($(wc -l < results_confirmed_traits/confirmed_reproductive_organs.csv) - 1))
          echo "confirmed corolla rows: ${corolla_rows}"
          echo "confirmed organ rows: ${organ_rows}"
          test "${corolla_rows}" -gt 0 || {
            echo "::error::Confirmed corolla CSV is empty."
            exit 1
          }
          test "${organ_rows}" -gt 0 || {
            echo "::error::Confirmed reproductive-organ CSV is empty."
            exit 1
          }
          head -n 3 results_confirmed_traits/confirmed_corolla_traits.csv
          head -n 3 results_confirmed_traits/confirmed_reproductive_organs.csv
      - name: Upload confirmed measurements
        uses: actions/upload-artifact@v4
        with:
          name: shimahotarubukuro-confirmed-traits
          path: results_confirmed_traits/
          retention-days: 14
          if-no-files-found: error
