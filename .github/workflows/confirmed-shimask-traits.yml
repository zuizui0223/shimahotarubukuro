name: Confirmed shimask trait measurements

on:
  pull_request:
    branches:
      - main
    paths:
      - "analyze_confirmed_all_sheets.py"
      - "analyze_confirmed_single_sheet.py"
      - "measure_confirmed_shimask_traits.py"
      - "shimask/**"
      - "shimahotarubukuro/**/*.jpg"
      - "shimahotarubukuro/**/*.jpeg"
      - "requirements.txt"
      - ".github/workflows/confirmed-shimask-traits.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  confirmed-traits:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run direct annotation unit tests
        run: python -m unittest tests.test_measure_confirmed_shimask_traits

      - name: Validate confirmed inputs
        shell: bash
        run: |
          set -euo pipefail
          test -d shimask
          count=$(find shimask -maxdepth 1 -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.tif' -o -iname '*.tiff' \) | wc -l)
          echo "confirmed annotation images: ${count}"
          test "${count}" -eq 20
          test -d shimahotarubukuro

      - name: Analyze all 20 confirmed sheets directly
        id: analysis
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python analyze_confirmed_all_sheets.py \
            --labels shimask \
            --raw-root shimahotarubukuro \
            --out-dir results_confirmed_all \
            2>&1 | tee confirmed-all-sheets.log

      - name: Summarize outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f results_confirmed_all/manifest.csv
          test -f results_confirmed_all/SUMMARY.txt
          cat results_confirmed_all/SUMMARY.txt
          cat results_confirmed_all/manifest.csv
          if test -f results_confirmed_all/FAILURES.txt; then
            echo '--- failures ---'
            cat results_confirmed_all/FAILURES.txt
          fi
          printf 'trait_csv_count=%s\n' "$(find results_confirmed_all -type f -name confirmed_reviewed_traits.csv | wc -l)"
          printf 'organ_csv_count=%s\n' "$(find results_confirmed_all -type f -name confirmed_reproductive_organs.csv | wc -l)"
          printf 'annotation_overlay_count=%s\n' "$(find results_confirmed_all -type f -name annotation_overlay_red_mask_green_organs.jpg | wc -l)"

      - name: Upload direct confirmed results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shimahotarubukuro-direct-confirmed-all-20-sheets
          path: |
            results_confirmed_all/
            confirmed-all-sheets.log
          retention-days: 14
          if-no-files-found: error

      - name: Enforce all-sheet completion
        if: always()
        env:
          ANALYSIS_OUTCOME: ${{ steps.analysis.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          test "${ANALYSIS_OUTCOME}" = success
          test "$(find results_confirmed_all -type f -name confirmed_reviewed_traits.csv | wc -l)" -eq 20
          test "$(find results_confirmed_all -type f -name confirmed_reproductive_organs.csv | wc -l)" -eq 20
          test "$(find results_confirmed_all -type f -name annotation_overlay_red_mask_green_organs.jpg | wc -l)" -eq 20
